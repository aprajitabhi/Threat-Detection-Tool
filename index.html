<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>>_ Threat Detection Tool</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background-color: #0d0d0d;
      color: #00ff00;
      padding: 20px;
      background-image: linear-gradient(rgba(0, 20, 0, 0.9), rgba(0, 20, 0, 0.9)),
                        repeating-linear-gradient(0deg, transparent, transparent 2px, #00ff00 2px, #00ff00 3px);
      background-size: 100% 100%, 100% 4px;
    }
    h1 {
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }
    button {
      padding: 12px 24px;
      margin: 10px 0;
      background-color: #0d0d0d;
      color: #00ff00;
      border: 2px solid #00ff00;
      cursor: pointer;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 10px #00ff00, inset 0 0 10px #00ff00;
      transition: all 0.3s ease;
    }
    button:hover {
      background-color: #00ff00;
      color: #0d0d0d;
      box-shadow: 0 0 20px #00ff00, inset 0 0 20px #0d0d0d;
    }
    pre {
      background-color: #000000;
      padding: 15px;
      border: 1px solid #00ff00;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
    }
    #listeningStatus {
      margin-top: 10px;
      color: #00ff00;
      font-family: 'Courier New', monospace;
    }
    .loading {
      color: #00ff00;
      font-style: italic;
      text-shadow: 0 0 5px #00ff00;
    }
    
    /* Radar Scanner */
    .radar-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 20px auto;
      border: 2px solid #00ff00;
      border-radius: 50%;
      overflow: hidden; /* Important */
      box-shadow: 0 0 20px #00ff00, inset 0 0 30px rgba(0, 255, 0, 0.2);
    }

    /* Scan beam */
    .radar-sweep {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      
      background: conic-gradient(
        from 0deg,
        rgba(0,255,0,0.5) 0deg,
        rgba(0,255,0,0.15) 40deg,
        transparent 70deg
      );

      top: 0;
      left: 0;

      transform-origin: center center;
      animation: radarSweep 2s linear infinite;
    }

    @keyframes radarSweep {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .radar-center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #00ff00;
      border: 2px solid rgba(0, 255, 0, 0.9);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
    }

    .radar-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0, 255, 0, 0.3);
      border-radius: 50%;
    }
    .ring1 { width: 60px; height: 60px; }
    .ring2 { width: 110px; height: 110px; }
    .ring3 { width: 160px; height: 160px; }
    
    .radar-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ff0000;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff0000;
      animation: blink 1s infinite;
    }
    
    @keyframes radarSweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>>_ THREAT DETECTION TOOL</h1>

  <div id="radar" class="radar-container hidden">
    <div class="radar-ring ring1"></div>
    <div class="radar-ring ring2"></div>
    <div class="radar-ring ring3"></div>
    <div class="radar-sweep"></div>
    <div class="radar-center"></div>
    <div class="radar-dot" style="top: 30%; left: 60%;"></div>
    <div class="radar-dot" style="top: 70%; left: 40%;"></div>
    <div class="radar-dot" style="top: 50%; left: 75%;"></div>
  </div>

  <button onclick="runScan()">Run Threat Detection</button>
  <pre id="output">Click the button or say "Abhi scan" to start scanning...</pre>

  <button onclick="downloadScan()">Download Scan Result</button>

  <div id="listeningStatus">🎙 Listening for "Abhi scan"...</div>

  <script>
    let scanCompleted = false;  // Flag to track scan status

    function runScan() {
      const output = document.getElementById('output');
      const radar = document.getElementById('radar');
      radar.classList.remove('hidden');
      output.innerHTML = '<span class="loading">🔄 SCANNING IN PROGRESS...</span>';
      
      fetch('/run-scan')
        .then(response => response.text())
        .then(data => {
          output.textContent = data;
          scanCompleted = true;
          radar.classList.add('hidden');
          abhiSpeak("Scan completed! Say 'Abhi download' to download the result.");
        });
    }

    function downloadScan() {
      if (scanCompleted) {
        fetch('/run-scan')
          .then(response => response.blob())
          .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'scan_result.txt';
            document.body.appendChild(a);
            a.click();
            a.remove();
          });
      } else {
        abhiSpeak("The scan isn't finished yet. Please say 'Abhi scan' to start.");
      }
    }

    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.lang = 'en-US';

    function abhiSpeak(message) {
      const speech = new SpeechSynthesisUtterance(message);
      speech.lang = 'en-US';
      speech.rate = 0.9;
      speech.pitch = 1;
      window.speechSynthesis.speak(speech);
    }

    const abhiSuccessReplies = [
      "Starting the scan now.",
      "Okay, running the scan for threats.",
      "Initiating system scan. Please wait.",
      "Got it! Scanning your system now.",
      "Scanning in progress. Sit tight."
    ];

    const abhiErrorReplies = [
      "Sorry, I didn't understand. Please say 'Abhi scan' to start.",
      "I didn't get that. Can you repeat 'Abhi scan'?",
      "Please repeat. Say 'Abhi scan' to begin scanning."
    ];

    function getRandomReply(arr) {
      const index = Math.floor(Math.random() * arr.length);
      return arr[index];
    }

    recognition.onresult = function(event) {
      const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
      console.log('Heard:', transcript);
      
      if (transcript.includes('abhi') && transcript.includes('scan')) {
        const successReply = getRandomReply(abhiSuccessReplies);
        abhiSpeak(successReply);
        runScan();
      } else if (transcript.includes('abhi') && transcript.includes('download')) {
        downloadScan();  // Trigger download
      } else {
        const errorReply = getRandomReply(abhiErrorReplies);
        abhiSpeak(errorReply);
      }
    }

    recognition.onerror = function(event) {
      console.error('Speech recognition error', event);
      document.getElementById('listeningStatus').textContent = '🎙 Error: Restarting listening...';
      recognition.start();
    }

    recognition.onend = function() {
      document.getElementById('listeningStatus').textContent = '🎙 Listening for "Abhi scan"...';
      recognition.start();
    }

    recognition.start();
  </script>
</body>
</html>
